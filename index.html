<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Vocab</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f2f8;
      --surface: #ffffff;
      --surface2: #f5f6fa;
      --border: #e0e3ef;
      --text: #1a1a2e;
      --text-muted: #6b7094;
      --text-dim: #b0b5cc;
      --accent: #4f5ff7;
      --accent-light: #eef0ff;
      --green: #16a34a;
      --green-bg: #f0fdf4;
      --red: #dc2626;
      --red-bg: #fef2f2;
      --yellow: #d97706;
      --yellow-bg: #fffbeb;
      --radius: 14px;
      --input-h: 58px;
      --transition: 0.16s ease;
      --shadow: 0 2px 12px rgba(79,95,247,0.08);
      --shadow-sm: 0 1px 4px rgba(0,0,0,0.06);
    }

    html, body { height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      line-height: 1.5; -webkit-font-smoothing: antialiased; }

    /* ── Nav ── */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; height: 56px;
      background: rgba(240,242,248,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; z-index: 100; gap: 10px;
    }
    .nav-logo { font-size: 17px; font-weight: 700; color: var(--accent); letter-spacing: -0.03em; flex-shrink: 0; }
    .nav-tabs { display: flex; gap: 4px; }
    .nav-tab {
      padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500;
      cursor: pointer; border: none; background: transparent; color: var(--text-muted); transition: var(--transition);
    }
    .nav-tab.active { background: var(--accent); color: #fff; }
    .nav-tab:hover:not(.active) { background: var(--accent-light); color: var(--accent); }
    .review-btn {
      padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600;
      cursor: pointer; border: 1.5px solid var(--border); background: var(--surface); color: var(--text-muted);
      transition: var(--transition); flex-shrink: 0;
    }
    .review-btn.active { background: var(--yellow-bg); border-color: rgba(217,119,6,0.4); color: var(--yellow); }
    .review-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

    /* ── Pages ── */
    .page { display: none !important; padding-top: 72px; }
    .page.active { display: block !important; }

    /* ── Quiz Page ── */
    #quiz-page.active { display: flex !important; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 80px 16px 24px; }
    .container { width: 100%; max-width: 580px; }

    .stats-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; font-size: 13px; color: var(--text-muted); }
    .stats-left { display: flex; gap: 18px; }
    .stat { display: flex; align-items: center; gap: 5px; }
    .stat-val { font-weight: 700; font-size: 15px; color: var(--text); }
    .review-indicator {
      font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase;
      padding: 3px 10px; border-radius: 20px; background: var(--yellow-bg);
      border: 1px solid rgba(217,119,6,0.25); color: var(--yellow); display: none;
    }
    .review-indicator.visible { display: inline-block; }

    /* ── Card ── */
    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 32px 32px 24px; position: relative; overflow: hidden; box-shadow: var(--shadow);
    }
    @media (max-width: 480px) { .card { padding: 22px 18px 18px; } }

    .progress-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--surface2); }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #818cf8); transition: width 0.45s ease; border-radius: 0 2px 2px 0; }

    .sentence-wrap { min-height: 64px; display: flex; align-items: center; margin-bottom: 6px; }
    #sentence { font-size: clamp(16px, 3.5vw, 20px); font-weight: 500; line-height: 1.6; color: var(--text); letter-spacing: -0.01em; }
    #sentence .blank { display: inline-block; color: var(--accent); font-weight: 700; border-bottom: 2.5px solid var(--accent); min-width: 48px; padding: 0 4px; }

    #korean-translation { font-size: 13px; color: var(--text-muted); margin-bottom: 10px; min-height: 18px; line-height: 1.5; padding-left: 2px; }

    /* ── Word info (shown from start) ── */
    .word-info-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; min-height: 20px; }
    .word-info-chip { font-size: 11px; padding: 3px 9px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); color: var(--text-muted); }
    .word-info-chip.pos { background: var(--accent-light); border-color: rgba(79,95,247,0.2); color: var(--accent); font-weight: 600; }
    .word-info-chip.syn { background: #f0fdf4; border-color: rgba(22,163,74,0.2); color: var(--green); }

    .attempts-row { display: flex; gap: 5px; margin-bottom: 10px; min-height: 18px; align-items: center; }
    .attempt-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: background 0.2s; }
    .attempt-dot.wrong { background: var(--red); }

    .input-wrap { position: relative; margin-bottom: 14px; }
    #answer-input {
      width: 100%; height: var(--input-h); background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 0 50px 0 18px; font-size: 17px; font-family: inherit; color: var(--text);
      outline: none; transition: border-color var(--transition), background var(--transition), box-shadow var(--transition);
      caret-color: var(--accent);
    }
    #answer-input::placeholder { color: var(--text-dim); }
    #answer-input:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 3px rgba(79,95,247,0.1); }
    #answer-input.correct { border-color: var(--green) !important; background: var(--green-bg) !important; color: var(--green) !important; box-shadow: 0 0 0 3px rgba(22,163,74,0.1) !important; }
    #answer-input.incorrect { border-color: var(--red) !important; background: var(--red-bg) !important; color: var(--red) !important; box-shadow: 0 0 0 3px rgba(220,38,38,0.1) !important; }
    .enter-hint { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: 11px; color: var(--text-dim); background: var(--surface); border: 1px solid var(--border); padding: 2px 7px; border-radius: 6px; pointer-events: none; }

    @keyframes shake {
      0%  { transform: translateX(0); } 15% { transform: translateX(-8px); }
      30% { transform: translateX(8px); } 45% { transform: translateX(-6px); }
      60% { transform: translateX(6px); } 75% { transform: translateX(-3px); }
      90% { transform: translateX(3px); } 100%{ transform: translateX(0); }
    }
    .shake { animation: shake 0.38s ease; }

    #hint-text { font-size: 13px; color: var(--yellow); background: var(--yellow-bg); border: 1px solid rgba(217,119,6,0.2); border-radius: 8px; padding: 7px 12px; margin-bottom: 10px; display: none; }

    .next-btn {
      width: 100%; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 600;
      border: none; cursor: pointer; background: var(--accent); color: #fff;
      margin-top: 8px; display: none; transition: opacity 0.2s;
    }
    .next-btn:hover { opacity: 0.9; }
    .next-btn.visible { display: block; }

    #feedback { opacity: 0; transition: opacity 0.2s ease; min-height: 1px; }
    #feedback.visible { opacity: 1; }
    .feedback-top { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
    .feedback-label { font-size: 12px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; }
    .feedback-label.correct { color: var(--green); }
    .feedback-label.incorrect { color: var(--red); }
    #correct-answer { font-size: 16px; font-weight: 700; color: var(--text); }
    #explanation { font-size: 13px; color: var(--text-muted); margin-bottom: 4px; line-height: 1.55; }

    .footer { margin-top: 14px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text-dim); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeUp 0.22s ease forwards; }

    /* ════ DASHBOARD ════ */
    #dashboard-page { min-height: 100vh; padding: 80px 24px 40px; }
    .dash-header { max-width: 860px; margin: 0 auto 24px; }
    .dash-header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 3px; }
    .dash-header p { color: var(--text-muted); font-size: 14px; }

    .dash-grid { max-width: 860px; margin: 0 auto 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
    .dash-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 18px 18px 14px; box-shadow: var(--shadow-sm); cursor: pointer; transition: var(--transition);
    }
    .dash-card:hover { box-shadow: var(--shadow); border-color: var(--accent); }
    .dash-card.no-click { cursor: default; }
    .dash-card.no-click:hover { box-shadow: var(--shadow-sm); border-color: var(--border); }
    .dash-card-label { font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 5px; }
    .dash-card-value { font-size: 28px; font-weight: 800; letter-spacing: -0.04em; color: var(--text); line-height: 1; }
    .dash-card-value.accent { color: var(--accent); }
    .dash-card-value.green { color: var(--green); }
    .dash-card-value.red { color: var(--red); }
    .dash-card-value.yellow { color: var(--yellow); }
    .dash-card-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .dash-card-arrow { float: right; color: var(--text-dim); font-size: 16px; margin-top: -2px; }

    .dash-section { max-width: 860px; margin: 0 auto 20px; }
    .dash-section-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; color: var(--text); }
    .dash-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow-sm); }

    .accuracy-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .accuracy-item { text-align: center; padding: 10px; }
    .ring-wrap { position: relative; display: inline-block; margin-bottom: 6px; }
    .ring-wrap svg { transform: rotate(-90deg); }
    .ring-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 15px; font-weight: 800; color: var(--text); }
    .accuracy-name { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }

    .chart-wrap { display: flex; align-items: flex-end; gap: 6px; height: 100px; padding-bottom: 24px; position: relative; }
    .chart-bar-group { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; height: 100%; justify-content: flex-end; position: relative; }
    .chart-bars { display: flex; gap: 2px; align-items: flex-end; width: 100%; justify-content: center; }
    .chart-bar { width: 10px; border-radius: 3px 3px 0 0; min-height: 2px; }
    .chart-bar.correct-bar { background: var(--green); }
    .chart-bar.incorrect-bar { background: var(--red); opacity: 0.7; }
    .chart-label { position: absolute; bottom: -20px; font-size: 10px; color: var(--text-dim); white-space: nowrap; }
    .chart-legend { display: flex; gap: 16px; margin-top: 30px; font-size: 12px; color: var(--text-muted); }
    .legend-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }

    .streak-row { display: flex; gap: 4px; flex-wrap: wrap; }
    .streak-day { width: 22px; height: 22px; border-radius: 4px; background: var(--surface2); border: 1px solid var(--border); font-size: 0; position: relative; }
    .streak-day.studied { background: var(--accent); border-color: var(--accent); }
    .streak-day.studied-today { background: var(--green); border-color: var(--green); box-shadow: 0 0 0 3px rgba(22,163,74,0.15); }

    /* ════ WORD LIST PAGES ════ */
    .list-page { min-height: 100vh; padding: 80px 24px 40px; }
    .list-header { max-width: 700px; margin: 0 auto 20px; display: flex; align-items: center; gap: 12px; }
    .back-btn {
      padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer;
      border: 1.5px solid var(--border); background: var(--surface); color: var(--text-muted); transition: var(--transition);
    }
    .back-btn:hover { border-color: var(--accent); color: var(--accent); }
    .list-header h2 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
    .list-header-sub { font-size: 13px; color: var(--text-muted); }

    .word-list { max-width: 700px; margin: 0 auto; display: flex; flex-direction: column; gap: 8px; }
    .word-item {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 14px 16px; box-shadow: var(--shadow-sm); display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;
    }
    .word-item-left { flex: 1; min-width: 0; }
    .word-item-sentence { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 2px; word-break: break-word; }
    .word-item-korean { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
    .word-item-chips { display: flex; gap: 5px; flex-wrap: wrap; }
    .word-item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .badge { font-size: 11px; font-weight: 700; border-radius: 20px; padding: 2px 9px; white-space: nowrap; }
    .badge.wrong { background: var(--red-bg); color: var(--red); }
    .badge.ok { background: var(--green-bg); color: var(--green); }
    .badge.neutral { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }

    .empty-state { text-align: center; padding: 40px 16px; color: var(--text-muted); font-size: 14px; }

    .search-bar {
      max-width: 700px; margin: 0 auto 14px; display: flex;
    }
    .search-bar input {
      width: 100%; padding: 10px 16px; border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 14px; font-family: inherit; outline: none; background: var(--surface); color: var(--text);
      transition: border-color var(--transition);
    }
    .search-bar input:focus { border-color: var(--accent); }
  </style>
</head>
<body>

<nav class="nav">
  <span class="nav-logo">Vocab</span>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('quiz')">퀴즈</button>
    <button class="nav-tab" onclick="showPage('dashboard')">대시보드</button>
  </div>
  <button class="review-btn" id="review-btn" onclick="toggleReviewMode()">복습 모드</button>
</nav>

<!-- ── Quiz Page ── -->
<div id="quiz-page" class="page active">
  <div class="container">
    <div class="stats-bar">
      <div class="stats-left">
        <div class="stat">🔥 <span class="stat-val" id="streak-val">0</span> <span>연속</span></div>
        <div class="stat"><span style="color:var(--green)">✓</span> <span class="stat-val" id="correct-val">0</span></div>
        <div class="stat"><span style="color:var(--red)">✗</span> <span class="stat-val" id="incorrect-val">0</span></div>
      </div>
      <span class="review-indicator" id="review-indicator">복습 모드</span>
    </div>

    <div class="card" id="card">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

      <div class="sentence-wrap"><div id="sentence"></div></div>
      <div id="korean-translation"></div>

      <!-- Word info shown from the start -->
      <div class="word-info-row" id="word-info-row"></div>

      <div class="attempts-row" id="attempts-row"></div>
      <div id="hint-text"></div>

      <div class="input-wrap">
        <input id="answer-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="정답을 입력하세요..." />
        <span class="enter-hint">↵ enter</span>
      </div>

      <div id="feedback">
        <div class="feedback-top">
          <span class="feedback-label" id="feedback-label"></span>
          <span id="correct-answer"></span>
        </div>
        <div id="explanation"></div>
      </div>

      <button class="next-btn" id="next-btn" onclick="loadNext()">다음 단어 →</button>
    </div>

    <div class="footer">
      <span id="queue-info"></span>
    </div>
  </div>
</div>

<!-- ── Dashboard Page ── -->
<div id="dashboard-page" class="page">
  <div class="dash-header">
    <h1>학습 대시보드</h1>
    <p id="dash-subtitle"></p>
  </div>

  <div class="dash-grid">
    <div class="dash-card no-click">
      <div class="dash-card-label">🔥 연속 학습일</div>
      <div class="dash-card-value yellow" id="d-streak">0</div>
      <div class="dash-card-sub">일 연속</div>
    </div>
    <div class="dash-card no-click">
      <div class="dash-card-label">📅 오늘 정답률</div>
      <div class="dash-card-value green" id="d-today-rate">-</div>
      <div class="dash-card-sub" id="d-today-sub">아직 없음</div>
    </div>
    <div class="dash-card" onclick="showPage('all-words')">
      <div class="dash-card-label">📚 전체 학습 단어 <span class="dash-card-arrow">›</span></div>
      <div class="dash-card-value accent" id="d-total-seen">0</div>
      <div class="dash-card-sub">개 단어 학습 완료</div>
    </div>
    <div class="dash-card" onclick="showPage('wrong-words')">
      <div class="dash-card-label">❌ 틀린 단어 <span class="dash-card-arrow">›</span></div>
      <div class="dash-card-value red" id="d-wrong-count">0</div>
      <div class="dash-card-sub">복습 필요</div>
    </div>
  </div>

  <div class="dash-section">
    <div class="dash-section-title">정답률 비교</div>
    <div class="dash-box">
      <div class="accuracy-row">
        <div class="accuracy-item">
          <div class="ring-wrap">
            <svg width="80" height="80" viewBox="0 0 80 80">
              <circle cx="40" cy="40" r="32" fill="none" stroke="#e0e3ef" stroke-width="8"/>
              <circle cx="40" cy="40" r="32" fill="none" stroke="#16a34a" stroke-width="8"
                stroke-dasharray="201" stroke-dashoffset="201" id="ring-today" stroke-linecap="round"/>
            </svg>
            <span class="ring-label" id="ring-today-label">-%</span>
          </div>
          <div class="accuracy-name">오늘</div>
        </div>
        <div class="accuracy-item">
          <div class="ring-wrap">
            <svg width="80" height="80" viewBox="0 0 80 80">
              <circle cx="40" cy="40" r="32" fill="none" stroke="#e0e3ef" stroke-width="8"/>
              <circle cx="40" cy="40" r="32" fill="none" stroke="#4f5ff7" stroke-width="8"
                stroke-dasharray="201" stroke-dashoffset="201" id="ring-total" stroke-linecap="round"/>
            </svg>
            <span class="ring-label" id="ring-total-label">-%</span>
          </div>
          <div class="accuracy-name">전체</div>
        </div>
      </div>
    </div>
  </div>

  <div class="dash-section">
    <div class="dash-section-title">최근 7일 추이</div>
    <div class="dash-box">
      <div class="chart-wrap" id="chart-wrap"></div>
      <div class="chart-legend">
        <span><span class="legend-dot" style="background:var(--green)"></span>정답</span>
        <span><span class="legend-dot" style="background:var(--red)"></span>오답</span>
      </div>
    </div>
  </div>

  <div class="dash-section">
    <div class="dash-section-title">출석 기록 (최근 30일)</div>
    <div class="dash-box">
      <div class="streak-row" id="streak-calendar"></div>
    </div>
  </div>
</div>

<!-- ── Wrong Words Page ── -->
<div id="wrong-words-page" class="page list-page">
  <div class="list-header">
    <button class="back-btn" onclick="showPage('dashboard')">← 뒤로</button>
    <div>
      <h2>틀린 단어 모음</h2>
      <div class="list-header-sub" id="wrong-words-sub"></div>
    </div>
  </div>
  <div class="search-bar"><input id="wrong-search" type="text" placeholder="단어 검색..." oninput="filterWrongWords()" /></div>
  <div class="word-list" id="wrong-list"></div>
</div>

<!-- ── All Words Page ── -->
<div id="all-words-page" class="page list-page">
  <div class="list-header">
    <button class="back-btn" onclick="showPage('dashboard')">← 뒤로</button>
    <div>
      <h2>전체 학습 단어</h2>
      <div class="list-header-sub" id="all-words-sub"></div>
    </div>
  </div>
  <div class="search-bar"><input id="all-search" type="text" placeholder="단어 검색..." oninput="filterAllWords()" /></div>
  <div class="word-list" id="all-list"></div>
</div>

<script>
// ════════════════════════════════════════════════════════
// DATASET
// ════════════════════════════════════════════════════════

// ════════════════════════════════════════════════════════
// STATE & CONFIG
// ════════════════════════════════════════════════════════
const MAX_WRONG_ATTEMPTS = 5;
const REVIEW_INTERVAL_NORMAL = 7 * 24 * 60 * 60 * 1000; // 7 days in ms
const REVIEW_INTERVAL_WRONG  = 2 * 24 * 60 * 60 * 1000; // 2 days for wrong items
const QUIZ_COUNT_BETWEEN_REVIEWS = 6; // every 6 normal questions, inject a review card

let state = {
  allItems: [],
  wrongItemIds: new Set(), // IDs of items that are wrong
  stats: { correct: 0, incorrect: 0, sessionCorrect: 0, sessionIncorrect: 0 },
  recentHistory: [],
  mode: 'normal', // 'normal' | 'review'
  currentItem: null,
  attempts: 0,
  answered: false,
  hadWrongThisRound: false, // track if current question was wrong (to add after next)
  wrongCountedThisQuestion: false, // track if stats.incorrect was already incremented
  aiQueue: [],
  dailyStats: {},
  studyStreak: 0,
  lastStudyDate: null,
  questionsSinceReview: 0,
};

// ════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════
const LS_KEY = 'vocabtrainer_v3';

function today() { return new Date().toISOString().slice(0, 10); }

function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
  return String(h >>> 0);
}

function normalizeAnswer(s) {
  return s.toLowerCase().trim().replace(/\s+/g, ' ').replace(/[.,!?;:]+$/, '');
}

function seenItemIds() {
  return new Set(state.allItems.filter(i => i.seenCount > 0).map(i => i.id));
}

// ════════════════════════════════════════════════════════
// PERSISTENCE
// ════════════════════════════════════════════════════════
function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
    if (saved.allItems?.length)   state.allItems = saved.allItems;
    if (saved.wrongItemIds)       state.wrongItemIds = new Set(saved.wrongItemIds);
    if (saved.stats)              state.stats = { ...state.stats, ...saved.stats };
    if (saved.recentHistory)      state.recentHistory = saved.recentHistory;
    if (saved.dailyStats)         state.dailyStats = saved.dailyStats;
    if (saved.studyStreak != null)state.studyStreak = saved.studyStreak;
    if (saved.lastStudyDate)      state.lastStudyDate = saved.lastStudyDate;
  } catch {}
}

function saveState() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({
      allItems: state.allItems,
      wrongItemIds: [...state.wrongItemIds],
      stats: state.stats,
      recentHistory: state.recentHistory,
      dailyStats: state.dailyStats,
      studyStreak: state.studyStreak,
      lastStudyDate: state.lastStudyDate,
    }));
  } catch {}
}

// ════════════════════════════════════════════════════════
// DAILY TRACKING
// ════════════════════════════════════════════════════════
function recordDaily(isCorrect, itemId) {
  const d = today();
  if (!state.dailyStats[d]) state.dailyStats[d] = { correct: 0, incorrect: 0, words: [] };
  if (isCorrect) state.dailyStats[d].correct++;
  else state.dailyStats[d].incorrect++;
  if (!state.dailyStats[d].words.includes(itemId)) state.dailyStats[d].words.push(itemId);
  if (state.lastStudyDate !== d) {
    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
    state.studyStreak = state.lastStudyDate === yesterday ? state.studyStreak + 1 : 1;
    state.lastStudyDate = d;
  }
}

// ════════════════════════════════════════════════════════
// INIT DATASET
// ════════════════════════════════════════════════════════
function initDataset() {
  loadState();
  const existingIds = new Set(state.allItems.map(i => i.id));
  const shuffled = [...BUILT_IN].sort(() => Math.random() - 0.5);
  for (const item of shuffled) {
    const id = hashStr(item.sentence);
    if (!existingIds.has(id)) {
      state.allItems.push({
        ...item, id, wrongCount: 0, seenCount: 0, isAi: false,
        lastSeenAt: 0, reviewInterval: REVIEW_INTERVAL_NORMAL,
      });
      existingIds.add(id);
    }
  }
  saveState();
}

// ════════════════════════════════════════════════════════
// QUESTION SELECTION
// ════════════════════════════════════════════════════════
function isDue(item) {
  if (!item.lastSeenAt) return true; // never seen
  return Date.now() - item.lastSeenAt >= item.reviewInterval;
}

function pickNextItem() {
  const recentIds = new Set(state.recentHistory.map(i => i.id));
  const wrongItems = state.allItems.filter(i => state.wrongItemIds.has(i.id));

  // In review mode: only wrong items
  if (state.mode === 'review') {
    let pool = wrongItems.filter(i => !recentIds.has(i.id));
    if (!pool.length) pool = wrongItems;
    if (!pool.length) pool = state.allItems.filter(i => !recentIds.has(i.id));
    const sorted = pool.sort((a, b) => (a.lastSeenAt || 0) - (b.lastSeenAt || 0));
    return sorted[0] || pool[0];
  }

  // Periodic review injection in normal mode
  if (state.questionsSinceReview >= QUIZ_COUNT_BETWEEN_REVIEWS && wrongItems.length > 0) {
    state.questionsSinceReview = 0;
    const pool = wrongItems.filter(i => !recentIds.has(i.id));
    if (pool.length) {
      pool.sort((a, b) => (a.lastSeenAt || 0) - (b.lastSeenAt || 0));
      return pool[0];
    }
  }

  // Spaced repetition: prioritize due items
  const due = state.allItems.filter(i => isDue(i) && !recentIds.has(i.id));
  const overdue = due.sort((a, b) => {
    const aScore = (a.wrongCount * 2) + (Date.now() - (a.lastSeenAt || 0)) / 1000000;
    const bScore = (b.wrongCount * 2) + (Date.now() - (b.lastSeenAt || 0)) / 1000000;
    return bScore - aScore;
  });

  if (overdue.length > 0) {
    const slice = Math.max(1, Math.floor(overdue.length / 3));
    const top = overdue.slice(0, slice);
    return top[Math.floor(Math.random() * top.length)];
  }

  // Fallback: any item
  const pool = state.allItems.filter(i => !recentIds.has(i.id));
  const fallback = pool.length ? pool : state.allItems;
  return fallback[Math.floor(Math.random() * fallback.length)] || state.allItems[0];
}

// ════════════════════════════════════════════════════════
// DOM REFS
// ════════════════════════════════════════════════════════
const $sentence     = document.getElementById('sentence');
const $korean       = document.getElementById('korean-translation');
const $wordInfoRow  = document.getElementById('word-info-row');
const $attemptsRow  = document.getElementById('attempts-row');
const $input        = document.getElementById('answer-input');
const $feedback     = document.getElementById('feedback');
const $feedLabel    = document.getElementById('feedback-label');
const $correctAns   = document.getElementById('correct-answer');
const $explanation  = document.getElementById('explanation');
const $streakVal    = document.getElementById('streak-val');
const $correctVal   = document.getElementById('correct-val');
const $incorrectVal = document.getElementById('incorrect-val');
const $reviewIndicator = document.getElementById('review-indicator');
const $reviewBtn    = document.getElementById('review-btn');
const $queueInfo    = document.getElementById('queue-info');
const $progressFill = document.getElementById('progress-fill');
const $hintText     = document.getElementById('hint-text');
const $nextBtn      = document.getElementById('next-btn');

// ════════════════════════════════════════════════════════
// RENDER HELPERS
// ════════════════════════════════════════════════════════
function renderSentence(item) {
  $sentence.innerHTML = item.sentence.replace('___', '<span class="blank">_____</span>');
  $korean.textContent = item.korean || '';
  // Show word info from the start
  renderWordInfo(item);
  $sentence.classList.add('fade-in');
  $sentence.addEventListener('animationend', () => $sentence.classList.remove('fade-in'), { once: true });
}

function renderWordInfo(item) {
  $wordInfoRow.innerHTML = '';
  if (item.partOfSpeech) {
    const c = document.createElement('span');
    c.className = 'word-info-chip pos';
    c.textContent = item.partOfSpeech;
    $wordInfoRow.appendChild(c);
  }
  (item.synonyms || []).forEach(s => {
    const c = document.createElement('span');
    c.className = 'word-info-chip syn';
    c.textContent = s;
    $wordInfoRow.appendChild(c);
  });
}

function renderAttempts() {
  $attemptsRow.innerHTML = '';
  for (let i = 0; i < MAX_WRONG_ATTEMPTS; i++) {
    const d = document.createElement('div');
    d.className = 'attempt-dot' + (i < state.attempts ? ' wrong' : '');
    $attemptsRow.appendChild(d);
  }
}

function renderStats() {
  $streakVal.textContent = state.stats.sessionCorrect || 0;
  $correctVal.textContent = state.stats.correct;
  $incorrectVal.textContent = state.stats.incorrect;

  const pct = state.allItems.length > 0
    ? Math.min(100, (state.allItems.filter(i => i.seenCount > 0).length / state.allItems.length) * 100)
    : 0;
  $progressFill.style.width = pct + '%';

  const wr = state.wrongItemIds.size;
  $queueInfo.textContent = wr > 0 ? `틀린 단어 ${wr}개 복습 필요` : `총 ${state.allItems.length}개 카드`;

  const isReview = state.mode === 'review';
  $reviewIndicator.className = 'review-indicator' + (isReview ? ' visible' : '');
  $reviewBtn.className = 'review-btn' + (isReview ? ' active' : '');
}

// ════════════════════════════════════════════════════════
// REVIEW MODE
// ════════════════════════════════════════════════════════
function toggleReviewMode() {
  state.mode = state.mode === 'review' ? 'normal' : 'review';
  renderStats();
  loadNext();
  showPage('quiz');
}

// ════════════════════════════════════════════════════════
// LOAD NEXT QUESTION
// ════════════════════════════════════════════════════════
function loadNext() {
  // If current item was wrong this round, now add it to wrongItemIds
  if (state.hadWrongThisRound && state.currentItem) {
    state.wrongItemIds.add(state.currentItem.id);
    saveState();
  }
  state.hadWrongThisRound = false;
  state.wrongCountedThisQuestion = false;
  state.answered = false;
  state.attempts = 0;
  $hintText.style.display = 'none';
  $feedback.classList.remove('visible');
  $feedLabel.textContent = '';
  $correctAns.textContent = '';
  $explanation.textContent = '';
  $input.value = '';
  $input.className = '';
  $input.disabled = false;
  $nextBtn.className = 'next-btn';
  renderAttempts();

  // Use AI queue occasionally
  const useAi = state.aiQueue.length > 0 && Math.random() < 0.12;
  state.currentItem = useAi ? state.aiQueue.shift() : pickNextItem();
  state.questionsSinceReview++;

  renderSentence(state.currentItem);
  renderStats();
  maybePrefetchAi();
  setTimeout(() => $input.focus(), 50);
}

// ════════════════════════════════════════════════════════
// AI PREFETCH
// ════════════════════════════════════════════════════════
async function maybePrefetchAi() {
  if (state.aiQueue.length >= 2) return;
  try {
    const res = await fetch('/api/ai-question', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ count: 1 }), signal: AbortSignal.timeout(5000)
    });
    if (!res.ok) return;
    const data = await res.json();
    if (data?.sentence && data?.answer) {
      const id = hashStr(data.sentence + '_ai');
      const enriched = { ...data, id, wrongCount: 0, seenCount: 0, isAi: true, lastSeenAt: 0, reviewInterval: REVIEW_INTERVAL_NORMAL };
      if (!state.allItems.find(i => i.id === id)) state.allItems.push(enriched);
      state.aiQueue.push(enriched);
    }
  } catch {}
}

// ════════════════════════════════════════════════════════
// SHOW HINT
// ════════════════════════════════════════════════════════
function showHint() {
  const letter = state.currentItem.answer[0];
  const rest = '_'.repeat(Math.max(0, state.currentItem.answer.length - 1));
  $hintText.textContent = `힌트: "${letter}${rest}"  ·  첫 글자는 '${letter.toUpperCase()}'`;
  $hintText.style.display = 'block';
}

// ════════════════════════════════════════════════════════
// HANDLE SUBMIT
// ════════════════════════════════════════════════════════
function handleSubmit() {
  if (state.answered) { loadNext(); return; }
  const raw = $input.value;
  if (!raw.trim()) return;

  const userAns = normalizeAnswer(raw);
  const correctAns = normalizeAnswer(state.currentItem.answer);
  const isCorrect = userAns === correctAns;
  const item = state.currentItem;

  if (isCorrect) {
    state.answered = true;
    state.stats.correct++;
    state.stats.sessionCorrect = (state.stats.sessionCorrect || 0) + 1;
    item.seenCount++;
    item.lastSeenAt = Date.now();

    // Increase review interval if correct (spaced repetition)
    if (state.wrongItemIds.has(item.id)) {
      // Still wrong — keep shorter interval, reset wrongCount
      item.wrongCount = Math.max(0, item.wrongCount - 1);
      if (item.wrongCount <= 0) {
        state.wrongItemIds.delete(item.id);
        item.reviewInterval = REVIEW_INTERVAL_NORMAL;
      } else {
        item.reviewInterval = REVIEW_INTERVAL_WRONG;
      }
    } else {
      // Correct — extend interval (double up to 30 days)
      item.reviewInterval = Math.min(item.reviewInterval * 2, 30 * 24 * 60 * 60 * 1000);
    }

    $input.classList.add('correct');
    $feedLabel.textContent = '정답!';
    $feedLabel.className = 'feedback-label correct';
    $correctAns.textContent = '';
    $explanation.textContent = item.explanation;
    $feedback.classList.add('visible');
    $nextBtn.className = 'next-btn visible';

    state.recentHistory = [item, ...state.recentHistory].slice(0, 5);
    recordDaily(true, item.id);
    saveState();
    renderStats();
    renderAttempts();

    // Auto-advance after 1.2s
    setTimeout(() => { if (state.answered) loadNext(); }, 1200);

  } else {
    state.attempts++;
    // Count each QUESTION wrong only once (not each wrong attempt)
    if (!state.wrongCountedThisQuestion) {
      state.stats.incorrect++;
      state.wrongCountedThisQuestion = true;
    }
    state.stats.sessionCorrect = state.stats.sessionCorrect || 0;
    item.seenCount++;
    item.wrongCount++;
    state.hadWrongThisRound = true; // mark — will be added to wrongItemIds on next card

    $input.classList.remove('shake');
    void $input.offsetWidth;
    $input.classList.add('shake', 'incorrect');
    $input.addEventListener('animationend', () => $input.classList.remove('shake'), { once: true });

    renderAttempts();
    if (state.attempts >= 3) showHint();

    if (state.attempts >= MAX_WRONG_ATTEMPTS) {
      state.answered = true;
      item.lastSeenAt = Date.now();
      item.reviewInterval = REVIEW_INTERVAL_WRONG;
      $feedLabel.textContent = '오답';
      $feedLabel.className = 'feedback-label incorrect';
      $correctAns.textContent = item.answer;
      $explanation.textContent = item.explanation;
      $feedback.classList.add('visible');
      $input.disabled = true;
      $input.classList.remove('incorrect');
      $nextBtn.className = 'next-btn visible';
    } else {
      $feedLabel.textContent = '틀렸습니다';
      $feedLabel.className = 'feedback-label incorrect';
      $correctAns.textContent = '';
      $explanation.textContent = `${MAX_WRONG_ATTEMPTS - state.attempts}번 더 시도할 수 있습니다.`;
      $feedback.classList.add('visible');
    }

    recordDaily(false, item.id);
    saveState();
    renderStats();

    if (!state.answered) {
      setTimeout(() => {
        $input.value = '';
        $input.classList.remove('incorrect');
        $input.focus();
      }, 600);
    }
  }
}

// ════════════════════════════════════════════════════════
// KEYBOARD
// ════════════════════════════════════════════════════════
// Enter only submits via the input handler.
// After 5 wrong attempts, "다음 단어" button is the only way to advance.

$input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); handleSubmit(); }
});

document.addEventListener('click', (e) => {
  const quizActive = document.getElementById('quiz-page').classList.contains('active');
  if (quizActive && !state.answered && e.target !== $input && e.target !== $nextBtn) {
    $input.focus();
  }
});

// ════════════════════════════════════════════════════════
// PAGE NAVIGATION
// ════════════════════════════════════════════════════════
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(name + '-page').classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(t => {
    if ((name === 'quiz' && t.textContent.trim() === '퀴즈') ||
        (name === 'dashboard' && t.textContent.trim() === '대시보드')) {
      t.classList.add('active');
    }
  });
  if (name === 'quiz') setTimeout(() => $input.focus(), 50);
  if (name === 'dashboard') renderDashboard();
  if (name === 'wrong-words') renderWrongWordsPage();
  if (name === 'all-words') renderAllWordsPage();
}

// ════════════════════════════════════════════════════════
// DASHBOARD
// ════════════════════════════════════════════════════════
function renderDashboard() {
  const d = today();
  const dayStats = state.dailyStats[d] || { correct: 0, incorrect: 0 };
  const todayTotal = dayStats.correct + dayStats.incorrect;
  const todayRate = todayTotal > 0 ? Math.round(dayStats.correct / todayTotal * 100) : null;
  const totalCorrect = state.stats.correct;
  const totalIncorrect = state.stats.incorrect;
  const totalAll = totalCorrect + totalIncorrect;
  const totalRate = totalAll > 0 ? Math.round(totalCorrect / totalAll * 100) : null;
  const seenCount = state.allItems.filter(i => i.seenCount > 0).length;

  const dateStr = new Date().toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
  document.getElementById('dash-subtitle').textContent = dateStr;
  document.getElementById('d-streak').textContent = state.studyStreak || 0;
  document.getElementById('d-today-rate').textContent = todayRate !== null ? `${todayRate}%` : '-';
  document.getElementById('d-today-sub').textContent = todayRate !== null ? `정답 ${dayStats.correct} / 오답 ${dayStats.incorrect}` : '아직 학습 없음';
  document.getElementById('d-total-seen').textContent = seenCount;
  document.getElementById('d-wrong-count').textContent = state.wrongItemIds.size;

  renderRing('ring-today', 'ring-today-label', todayRate, '#16a34a');
  renderRing('ring-total', 'ring-total-label', totalRate, '#4f5ff7');
  render7DayChart();
  renderStreakCalendar();
}

function renderRing(circleId, labelId, pct, color) {
  const circle = document.getElementById(circleId);
  const label = document.getElementById(labelId);
  const circumference = 2 * Math.PI * 32;
  if (pct === null) { circle.style.strokeDashoffset = circumference; label.textContent = '-%'; }
  else { circle.style.strokeDashoffset = circumference - (pct / 100) * circumference; label.textContent = pct + '%'; }
  circle.style.stroke = color;
  circle.style.transition = 'stroke-dashoffset 0.6s ease';
}

function render7DayChart() {
  const wrap = document.getElementById('chart-wrap');
  wrap.innerHTML = '';
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const dt = new Date(Date.now() - i * 86400000);
    const key = dt.toISOString().slice(0, 10);
    const label = dt.toLocaleDateString('ko-KR', { month:'numeric', day:'numeric' });
    const s = state.dailyStats[key] || { correct: 0, incorrect: 0 };
    days.push({ key, label, ...s });
  }
  const maxVal = Math.max(...days.map(d => d.correct + d.incorrect), 1);
  days.forEach(day => {
    const group = document.createElement('div');
    group.className = 'chart-bar-group';
    const bars = document.createElement('div');
    bars.className = 'chart-bars';
    const correctH = Math.round((day.correct / maxVal) * 76);
    const wrongH = Math.round((day.incorrect / maxVal) * 76);
    const b1 = document.createElement('div');
    b1.className = 'chart-bar correct-bar';
    b1.style.height = (correctH || 2) + 'px';
    b1.title = `정답: ${day.correct}`;
    const b2 = document.createElement('div');
    b2.className = 'chart-bar incorrect-bar';
    b2.style.height = (wrongH || 2) + 'px';
    b2.title = `오답: ${day.incorrect}`;
    bars.appendChild(b1); bars.appendChild(b2);
    group.appendChild(bars);
    const lbl = document.createElement('div');
    lbl.className = 'chart-label';
    lbl.textContent = day.label;
    group.appendChild(lbl);
    wrap.appendChild(group);
  });
}

function renderStreakCalendar() {
  const cal = document.getElementById('streak-calendar');
  cal.innerHTML = '';
  const d = today();
  for (let i = 29; i >= 0; i--) {
    const dt = new Date(Date.now() - i * 86400000);
    const key = dt.toISOString().slice(0, 10);
    const hasStudied = !!state.dailyStats[key];
    const isToday = key === d;
    const div = document.createElement('div');
    div.className = 'streak-day' + (isToday && hasStudied ? ' studied-today' : hasStudied ? ' studied' : '');
    div.title = key + (hasStudied ? ` (정답 ${state.dailyStats[key].correct}, 오답 ${state.dailyStats[key].incorrect})` : '');
    cal.appendChild(div);
  }
}

// WRONG WORDS PAGE
// ════════════════════════════════════════════════════════
let _wrongFilter = '';
function filterWrongWords() {
  _wrongFilter = document.getElementById('wrong-search').value.toLowerCase();
  renderWrongList();
}

function renderWrongWordsPage() {
  const wrongItems = state.allItems.filter(i => state.wrongItemIds.has(i.id))
    .sort((a, b) => b.wrongCount - a.wrongCount);
  document.getElementById('wrong-words-sub').textContent = `총 ${wrongItems.length}개 단어`;
  renderWrongList();
}

function renderWrongList() {
  const list = document.getElementById('wrong-list');
  const wrongItems = state.allItems.filter(i => state.wrongItemIds.has(i.id))
    .sort((a, b) => b.wrongCount - a.wrongCount);
  const filtered = _wrongFilter
    ? wrongItems.filter(i => i.sentence.toLowerCase().includes(_wrongFilter) || i.answer.toLowerCase().includes(_wrongFilter) || (i.korean || '').includes(_wrongFilter))
    : wrongItems;

  list.innerHTML = '';
  if (!filtered.length) {
    list.innerHTML = '<div class="empty-state">틀린 단어가 없어요! 계속 유지하세요 🎉</div>';
    return;
  }
  filtered.slice(0, 50).forEach(item => {
    const div = document.createElement('div');
    div.className = 'word-item';
    const left = document.createElement('div');
    left.className = 'word-item-left';
    const sent = document.createElement('div');
    sent.className = 'word-item-sentence';
    sent.textContent = item.sentence.replace('___', `[${item.answer}]`);
    const kor = document.createElement('div');
    kor.className = 'word-item-korean';
    kor.textContent = item.korean || '';
    const chips = document.createElement('div');
    chips.className = 'word-item-chips';
    if (item.partOfSpeech) {
      const c = document.createElement('span');
      c.className = 'word-info-chip pos';
      c.textContent = item.partOfSpeech;
      chips.appendChild(c);
    }
    (item.synonyms || []).slice(0, 2).forEach(s => {
      const c = document.createElement('span');
      c.className = 'word-info-chip syn';
      c.textContent = s;
      chips.appendChild(c);
    });
    left.appendChild(sent); left.appendChild(kor); left.appendChild(chips);
    const right = document.createElement('div');
    right.className = 'word-item-right';
    const badge = document.createElement('span');
    badge.className = 'badge wrong';
    badge.textContent = `${item.wrongCount}회 오답`;
    right.appendChild(badge);
    div.appendChild(left); div.appendChild(right);
    list.appendChild(div);
  });
}

// ════════════════════════════════════════════════════════
// ALL WORDS PAGE
// ════════════════════════════════════════════════════════
let _allFilter = '';
function filterAllWords() {
  _allFilter = document.getElementById('all-search').value.toLowerCase();
  renderAllList();
}

function renderAllWordsPage() {
  const seen = state.allItems.filter(i => i.seenCount > 0);
  document.getElementById('all-words-sub').textContent = `${seen.length}개 단어 학습 완료 (전체 ${state.allItems.length}개)`;
  renderAllList();
}

function renderAllList() {
  const list = document.getElementById('all-list');
  const seen = state.allItems.filter(i => i.seenCount > 0)
    .sort((a, b) => (b.lastSeenAt || 0) - (a.lastSeenAt || 0));
  const filtered = _allFilter
    ? seen.filter(i => i.sentence.toLowerCase().includes(_allFilter) || i.answer.toLowerCase().includes(_allFilter) || (i.korean || '').includes(_allFilter))
    : seen;

  list.innerHTML = '';
  if (!filtered.length) {
    list.innerHTML = '<div class="empty-state">아직 학습한 단어가 없어요. 퀴즈를 시작해보세요!</div>';
    return;
  }
  filtered.slice(0, 100).forEach(item => {
    const div = document.createElement('div');
    div.className = 'word-item';
    const left = document.createElement('div');
    left.className = 'word-item-left';
    const sent = document.createElement('div');
    sent.className = 'word-item-sentence';
    sent.textContent = item.sentence.replace('___', `[${item.answer}]`);
    const kor = document.createElement('div');
    kor.className = 'word-item-korean';
    kor.textContent = item.korean || '';
    const chips = document.createElement('div');
    chips.className = 'word-item-chips';
    if (item.partOfSpeech) {
      const c = document.createElement('span');
      c.className = 'word-info-chip pos';
      c.textContent = item.partOfSpeech;
      chips.appendChild(c);
    }
    (item.synonyms || []).slice(0, 2).forEach(s => {
      const c = document.createElement('span');
      c.className = 'word-info-chip syn';
      c.textContent = s;
      chips.appendChild(c);
    });
    left.appendChild(sent); left.appendChild(kor); left.appendChild(chips);
    const right = document.createElement('div');
    right.className = 'word-item-right';
    const seenBadge = document.createElement('span');
    seenBadge.className = 'badge neutral';
    seenBadge.textContent = `${item.seenCount}회`;
    right.appendChild(seenBadge);
    if (state.wrongItemIds.has(item.id)) {
      const wrongBadge = document.createElement('span');
      wrongBadge.className = 'badge wrong';
      wrongBadge.textContent = `${item.wrongCount}회 오답`;
      right.appendChild(wrongBadge);
    } else if (item.seenCount > 0) {
      const okBadge = document.createElement('span');
      okBadge.className = 'badge ok';
      okBadge.textContent = '✓';
      right.appendChild(okBadge);
    }
    div.appendChild(left); div.appendChild(right);
    list.appendChild(div);
  });
}
